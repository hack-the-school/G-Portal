<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google</title>
    <link rel="icon" type="image/x-icon" href="https://www.google.com/favicon.ico">
    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; font-family: arial, sans-serif; background: #fff; overflow: hidden; }
        
        #form-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); display: flex; flex-direction: column;
            align-items: center; justify-content: center; z-index: 10000;
        }
        .form-container {
            width: 90%; max-width: 800px; height: 80%; background: #fff;
            border-radius: 12px; overflow: hidden; position: relative;
            box-shadow: 0 0 30px rgba(0, 242, 255, 0.4);
        }
        .form-container iframe { width: 100%; height: 100%; border: none; }
        .close-form-btn {
            margin-top: 15px; padding: 12px 30px; background: #00f2ff;
            color: #000; border: none; border-radius: 5px; font-weight: bold;
            cursor: pointer; font-size: 1rem; transition: 0.2s;
        }
        .close-form-btn:hover { background: #00c8d4; transform: scale(1.05); }

        #mobile-panic {
            position: fixed; top: 10px; right: 10px; z-index: 20001;
            background: #ff4444; color: white; border: none; padding: 10px 15px;
            border-radius: 5px; font-weight: bold; display: none; cursor: pointer;
        }

        #google-home { display: flex; flex-direction: column; height: 100vh; align-items: center; background: #fff; position: relative; z-index: 20; }
        .search-container { flex: 1; display: flex; flex-direction: column; align-items: center; padding-top: 100px; width: 100%; }
        .google-logo { width: 272px; margin-bottom: 30px; cursor: pointer; }
        .search-bar { width: 100%; max-width: 584px; height: 44px; border: 1px solid #dfe1e5; border-radius: 24px; padding: 0 45px; box-sizing: border-box; outline: none; font-size: 16px; }
        
        #portal-nav {
            display: none; background-color: #000; padding: 0 20px; align-items: center;
            justify-content: space-between; border-bottom: 1px solid #333; height: 55px; box-sizing: border-box; color: white;
            font-family: 'Segoe UI', sans-serif; position: relative; z-index: 30;
        }
        .nav-left { display: flex; align-items: center; gap: 20px; }
        .logo { font-weight: bold; color: #00f2ff; letter-spacing: 1px; }
        .nav-btn { background: #222; color: white; border: 1px solid #444; padding: 6px 14px; border-radius: 4px; cursor: pointer; }

        #portal-home, #games-library {
            padding: 50px; display: none; grid-template-columns: repeat(auto-fill, 220px);
            grid-auto-rows: 200px; gap: 20px; height: calc(100vh - 55px); background: transparent;
            box-sizing: border-box; justify-content: center; overflow-y: auto; position: relative; z-index: 20;
        }

        .card {
            background: rgba(24, 24, 24, 0.9); border-radius: 12px; border: 1px solid #333; cursor: pointer;
            text-align: center; display: flex; flex-direction: column; overflow: hidden; color: white; transition: 0.3s;
            position: relative;
        }
        .card:hover { border-color: #00f2ff; transform: translateY(-5px) !important; }
        .card-img { flex: 1; display: flex; align-items: center; justify-content: center; font-size: 3rem; background: #222; }
        .card-info { padding: 10px; background: #181818; border-top: 1px solid #333; }
        .card-info h3 { margin: 0; font-size: 0.85rem; text-transform: uppercase; }

        /* --- ADVANCED CHAT EFFECTS --- */
        .glow-card { border-color: #00f2ff !important; }
        
        @keyframes pulse-glow {
            0% { box-shadow: 0 0 5px rgba(0, 242, 255, 0.4); border-color: #00f2ff; }
            50% { box-shadow: 0 0 25px rgba(0, 242, 255, 0.9); border-color: #fff; }
            100% { box-shadow: 0 0 5px rgba(0, 242, 255, 0.4); border-color: #00f2ff; }
        }

        .shimmer::after {
            content: ''; position: absolute; top: -50%; left: -60%; width: 30%; height: 200%;
            background: rgba(255, 255, 255, 0.15); transform: rotate(30deg); animation: shimmer-swipe 4s infinite;
        }
        @keyframes shimmer-swipe { 0% { left: -60%; } 15% { left: 120%; } 100% { left: 120%; } }

        .float-anim { animation: floating 3s ease-in-out infinite, pulse-glow 2s infinite; }
        @keyframes floating { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

        .badge-container { position: absolute; top: 10px; right: 10px; display: flex; align-items: center; gap: 6px; z-index: 5; }
        .badge { background: #ff4444; color: white; font-size: 0.65rem; padding: 2px 6px; border-radius: 4px; font-weight: bold; }
        .ping-dot { width: 8px; height: 8px; background: #00ff00; border-radius: 50%; animation: ping 1.5s infinite; }
        @keyframes ping { 0% { transform: scale(1); opacity: 1; box-shadow: 0 0 0 0 rgba(0, 255, 0, 0.7); } 100% { transform: scale(2.5); opacity: 0; box-shadow: 0 0 0 10px rgba(0, 255, 0, 0); } }
        /* ---------------------------- */

        #matrix-bg { position: fixed; top: 55px; left: 0; width: 100%; height: calc(100vh - 55px); border: none; z-index: 1; display: none; }
        #content-frame { width: 100%; height: calc(100vh - 55px); border: none; display: none; position: relative; z-index: 40; background: #000; }

        @media (max-width: 768px) { #mobile-panic { display: block; } }
    </style>
</head>
<body>

<button id="mobile-panic" onclick="panic()">EXIT</button>

<div id="form-overlay">
    <div class="form-container">
        <iframe src="https://docs.google.com/forms/d/e/1FAIpQLSf6iImNLMusiHH0mx6KUgTtrhUd871FXrFgnT0O8pYIVH09Mw/viewform?embedded=true">Loading…</iframe>
    </div>
    <button class="close-form-btn" onclick="dismissForm()">I've Finished / Enter Site</button>
</div>

<div id="google-home">
    <div class="search-container">
        <img src="https://www.google.com/images/branding/googlelogo/2x/googlelogo_color_272x92dp.png" class="google-logo" alt="Google" onclick="showPortal()">
        <input type="text" class="search-bar">
    </div>
</div>

<nav id="portal-nav">
    <div class="nav-left">
        <div class="logo">G-PORTAL</div>
        <button class="nav-btn" onclick="goHome()">🏠 Home</button>
        <button class="nav-btn" onclick="loadDesktop()">🖥️ Desktop</button>
    </div>
    <div class="credit-text">Made By CantBlockThis</div>
    <div style="color: #666; font-size: 0.75rem;">ESC to Panic</div>
</nav>

<iframe id="matrix-bg" src="https://rezmason.github.io/matrix/"></iframe>

<div id="portal-home">
    <div class="card" onclick="openGames()">
        <div class="card-img">🎮</div>
        <div class="card-info"><h3>Games Library</h3></div>
    </div>
    
    <div class="card glow-card shimmer float-anim" onclick="openInNewTab('https://try-nexus.base44.app/')">
        <div class="badge-container">
            <div class="ping-dot"></div>
            <div class="badge">LIVE CHAT</div>
        </div>
        <div class="card-img">💬</div>
        <div class="card-info"><h3>Connect <span style="color: #00f2ff;">(Active)</span></h3></div>
    </div>

    <div class="card" onclick="openInNewTab('https://yewtu.be/feed/trending?type=Gaming&region=US')">
        <div class="card-img">📺</div>
        <div class="card-info"><h3>YouTube</h3></div>
    </div>
    <div class="card" onclick="loadInIframe('https://doxyedu.dpdns.org/')">
        <div class="card-img">🌐</div>
        <div class="card-info"><h3>Proxy</h3></div>
    </div>
    <div class="card" onclick="loadInIframe('https://soundboardguys.com/sort/trending')">
        <div class="card-img">🔊</div>
        <div class="card-info"><h3>SoundBoard</h3></div>
    </div>
</div>

<div id="games-library">
    <div class="card" onclick="goHome()" style="border-color: #ff4444;">
        <div class="card-img">🔙</div>
        <div class="card-info"><h3>Back</h3></div>
    </div>
    <div class="card" onclick="openInNewTab('https://retrogamesfree.com/resident-evil-3-nemesis-u/#google_vignette/')">
        <div class="card-img">🧟</div>
        <div class="card-info"><h3>Resident Evil 3</h3></div>
    </div>
    <div class="card" onclick="loadInIframe('https://the-pizza-edition.vercel.app/category/popular.html')">
        <div class="card-img">🍕</div>
        <div class="card-info"><h3>Pizza Edition</h3></div>
    </div>
    <div class="card" onclick="loadInIframe('https://emulatorjs.vercel.app/')">
        <div class="card-img">🕹️</div>
        <div class="card-info"><h3>Emulator</h3></div>
    </div>
    <div class="card" onclick="loadInIframe('https://eagler.colbster937.dev/')">
        <div class="card-img">⛏️</div>
        <div class="card-info"><h3>Minecraft</h3></div>
    </div>
    <div class="card" onclick="loadInIframe('https://ruihq.github.io/FNAF2/')">
        <div class="card-img">🐻</div>
        <div class="card-info"><h3>FNAF 2</h3></div>
    </div>
    <div class="card" onclick="loadInIframe('https://schoolboy-runaway.com/hello-neighbor/')">
        <div class="card-img">🏠</div>
        <div class="card-info"><h3>Hello Neighbor</h3></div>
    </div>
    <div class="card" onclick="loadInIframe('https://geometrydashlitefree.com/')">
        <div class="card-img">🟩</div>
        <div class="card-info"><h3>Geometry Dash</h3></div>
    </div>
    <div class="card" onclick="loadInIframe('https://jxmked.github.io/Flappybird/')">
        <div class="card-img">🐦</div>
        <div class="card-info"><h3>Flappy Bird</h3></div>
    </div>
    <div class="card" onclick="loadInIframe('https://vexgame-unblocked.github.io/#')">
        <div class="card-img">🏃</div>
        <div class="card-info"><h3>Vex 5</h3></div>
    </div>
</div>

<iframe id="content-frame" src="about:blank" allowfullscreen="true"></iframe>

<script>
    const frame = document.getElementById('content-frame');
    const portal = document.getElementById('portal-home');
    const games = document.getElementById('games-library');
    const google = document.getElementById('google-home');
    const pNav = document.getElementById('portal-nav');
    const formOverlay = document.getElementById('form-overlay');
    const matrix = document.getElementById('matrix-bg');

    function dismissForm() { formOverlay.style.display = 'none'; }
    function killPopups() {
        window.onbeforeunload = null;
        window.onunload = null;
        try { if (frame.contentWindow) { frame.contentWindow.onbeforeunload = null; frame.contentWindow.onunload = null; } } catch (e) {}
    }
    setInterval(killPopups, 1000);

    function showPortal() {
        google.style.display = 'none';
        pNav.style.display = 'flex';
        portal.style.display = 'grid';
        matrix.style.display = 'block';
        document.body.style.background = "#0b0b0b";
    }
    function openGames() { portal.style.display = 'none'; games.style.display = 'grid'; }
    function goHome() {
        killPopups();
        frame.style.display = 'none'; frame.src = 'about:blank';
        games.style.display = 'none'; portal.style.display = 'grid';
        pNav.style.display = 'flex'; matrix.style.display = 'block';
    }
    function loadDesktop() { loadInIframe('https://win11-emu-react.vercel.app/'); }
    function loadInIframe(url) {
        portal.style.display = 'none'; games.style.display = 'none';
        matrix.style.display = 'none'; frame.style.display = 'block';
        frame.src = url;
    }
    function openInNewTab(url) { window.open(url, '_blank').focus(); }
    function panic() { killPopups(); window.location.replace("https://www.google.com"); }
    window.addEventListener('keydown', (e) => { if (e.key === "Escape") panic(); });
</script>

</body>
</html>
